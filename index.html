<!DOCTYPE html>
<html>
  <head>
    <title>CaltheDevGirl</title>
     <style>
      /* Style for the header bar */
      .header {
        height: 50px;
        background-color: #333;
        color: white;
        display: flex;
        align-items: center;
      }

      /* Style for the hamburger menu icon */
      .hamburger-menu {
        width: 30px;
        height: 30px;
        background-color: white;
        border: none;
        cursor: pointer;
      }

      /* Style for the hamburger menu */
      .menu {
        display: none;
      }

      /* Style for the menu items */
      .menu-item {
        padding: 10px;
        background-color: #333;
        color: white;
        cursor: pointer;
      }

      /* Style for the active menu item */
      .active {
        background-color: #555;
      }
    </style>
  </head>
  <body>
     <div class="header">
      <button class="hamburger-menu">
        Menu
      </button>
      <div class="menu">
        <div class="menu-item active">Home</div>
        <div class="menu-item">About</div>
        <div class="menu-item">Contact</div>
      </div>
    </div>
    <h1>Welcome to my GitHub Website!</h1>
    <p>This is where I post all my projects, tutorials, blogposts, and dev-resources</p>
  </body>
</html>
